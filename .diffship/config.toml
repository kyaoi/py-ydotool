# diffship project configuration (generated by `diffship init`)
#
# Repository snapshot:
# - repo: py-ydotool
# - current branch: main
# - preferred promote target: main
#
# See also: docs/CONFIG.md
# Precedence: CLI > manifest > project > global > default
#
# Bootstrap workflow profile selected during init: balanced
# See `.diffship/WORKFLOW_PROFILE.md` for the repo-local workflow expectations that profile generated.
#
# Use this file in two layers:
# - Keep the user-owned defaults aligned with how this repository actually uses diffship
# - Put AI-editable defaults and `.diffship/*` edit allowlist entries in `.diffship/ai_generated_config.toml`
# - `.diffship/ai_generated_config.toml` is loaded first; this file keeps final say for scalar defaults

# Customize this section: choose default verify behavior for this repository.
# Use a built-in profile (`fast`, `standard`, `full`) or define `[verify.profiles."<name>"]` below.

[verify]
default_profile = "standard" # fast|standard|full

# Customize this section: choose default handoff packing behavior.
# `output_dir` is the parent directory for auto-generated bundle names.
[handoff]
default_profile = "20x512"   # built-in: 20x512|10x100 or a custom [handoff.profiles."<name>"]
output_dir = "./.diffship/artifacts/handoffs" # optional parent dir for auto-generated bundle names

# Customize this section: add named handoff profiles shared by this repository or team.
# Copy `[handoff.profiles.*]` stanzas into another repo or `~/.config/diffship/config.toml`
# if you want to share the same named limits across projects.
# [handoff.profiles."team-ci"]
# max_parts = 8
# max_bytes_per_part = 104857600
#
# `plan.toml` exports the selected profile name plus resolved numeric limits.
# It does not export the full profile catalog.

# Customize this section: choose how successful verified runs are promoted.
[ops.promote]
mode = "commit"           # none|working-tree|commit
target_branch = "main"

# Customize this section: decide whether diffship commits automatically after verify succeeds.
[ops.commit]
policy = "auto"            # auto|manual

# Customize this section: local-only commands to run automatically after a successful apply.
# These are local-only config values; patch bundles cannot define them.
# Keep `post_apply` narrow: repository-local normalization only (formatting, docs/spec sync, deterministic fixups).
# Do not use it to compensate for invalid AI artifacts or to hide missing review/verify steps.
# [ops.post_apply]
# Rust-oriented preset:
# cmd1 = "cargo fmt --all"
# cmd2 = "just docs-check"
# cmd3 = "just trace-check"
#
# Node/TS-oriented preset:
# cmd1 = "pnpm exec prettier -w ."
# cmd2 = "pnpm exec eslint . --fix"
#
# Docs/spec-oriented preset:
# cmd1 = "just docs-check"
# cmd2 = "just trace-check"

# Customize this section: prefer `.diffship/forbid.toml` for dedicated forbid patterns.
# That file is also generated by `diffship init` and merged as project-local config.
# You can still keep `[ops.forbid]` entries here if you prefer a single file.

